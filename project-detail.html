<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Detail</title>
  <style>
    @font-face {
      font-family: "Wix Madefor Text";
      src: url("./fonts/WixMadeforText-Regular.ttf") format("truetype");
      font-style: normal;
      font-weight: 400;
      font-display: swap;
    }

    @font-face {
      font-family: "Wix Madefor Text";
      src: url("./fonts/WixMadeforText-Medium.ttf") format("truetype");
      font-style: normal;
      font-weight: 500;
      font-display: swap;
    }

    @font-face {
      font-family: "Wix Madefor Text";
      src: url("./fonts/WixMadeforText-SemiBold.ttf") format("truetype");
      font-style: normal;
      font-weight: 600;
      font-display: swap;
    }

    @font-face {
      font-family: "Wix Madefor Text";
      src: url("./fonts/WixMadeforText-Bold.ttf") format("truetype");
      font-style: normal;
      font-weight: 700;
      font-display: swap;
    }

    @font-face {
      font-family: "Wix Madefor Text";
      src: url("./fonts/WixMadeforText-ExtraBold.ttf") format("truetype");
      font-style: normal;
      font-weight: 800;
      font-display: swap;
    }

    :root {
      --bg: #f5f1ea;
      --fg: #18180f;
      --muted: rgba(24, 24, 15, 0.72);
      --soft-muted: rgba(24, 24, 15, 0.38);
      --border: rgba(24, 24, 15, 0.12);
      --panel: rgba(255, 255, 255, 0.42);
      --font-display: "Bricolage Grotesque", sans-serif;
      --font-body: "Wix Madefor Text", sans-serif;
      --ease-out-expo: cubic-bezier(.16,1,.3,1);
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(255, 107, 157, 0.14), transparent 28%),
        radial-gradient(circle at 80% 15%, rgba(78, 191, 237, 0.16), transparent 24%),
        var(--bg);
      color: var(--fg);
      font-family: var(--font-body);
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .back-link {
      position: fixed;
      top: 1.8rem;
      left: 2rem;
      z-index: 20;
      display: inline-flex;
      align-items: center;
      gap: 0.65rem;
      font-size: 0.88rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      padding-bottom: 0.18rem;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
    }

    .detail-page {
      width: 100%;
    }

    .detail-hero {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 2fr;
      align-items: start;
      padding: 7rem 2rem 3rem;
      position: relative;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .detail-copy {
      grid-column: 2 / 3;
      width: 100%;
      margin-left: auto;
      position: sticky;
      top: 6rem;
      z-index: 3;
      transition: color .45s ease, opacity .45s ease;
    }

    .detail-copy-stack {
      grid-column: 2 / 3;
      width: 100%;
      margin-left: auto;
      position: sticky;
      top: 6rem;
      z-index: 3;
    }

    .detail-copy-stack .detail-copy {
      grid-column: auto;
      width: 100%;
      margin-left: 0;
      position: absolute;
      inset: 0;
      top: 0;
      pointer-events: none;
    }

    .detail-copy-stack .detail-copy:first-child {
      position: relative;
    }

    .detail-copy-secondary {
      opacity: 0;
    }

    .detail-copy-secondary[hidden] {
      display: none !important;
    }

    body.exhibition-copy-active .detail-copy-primary {
      opacity: 0;
      pointer-events: none;
    }

    body.exhibition-copy-active .detail-copy-secondary {
      opacity: 1;
      pointer-events: auto;
      color: #fff;
    }

    body.exhibition-copy-active .detail-copy-secondary,
    body.exhibition-copy-active .detail-copy-secondary .meta-value,
    body.exhibition-copy-active .detail-copy-secondary .abstract {
      color: #fff;
    }

    body.exhibition-copy-dimmed .detail-copy-secondary,
    body.exhibition-copy-dimmed .detail-copy-secondary .meta-value,
    body.exhibition-copy-dimmed .detail-copy-secondary .abstract {
      color: var(--soft-muted);
    }

    body.scrolled-copy .detail-copy-primary,
    body.scrolled-copy .detail-copy-primary .meta-value,
    body.scrolled-copy .detail-copy-primary .abstract {
      color: var(--soft-muted);
    }

    .eyebrow {
      margin: 0 0 1rem;
      font-size: 0.78rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .detail-title {
      margin: 0 0 1.4rem;
      font-family: var(--font-display);
      font-size: clamp(2.6rem, 7vw, 7rem);
      line-height: 0.92;
      max-width: 12ch;
    }

    .abstract {
      margin: 0;
      max-width: calc(100vw - 4rem);
      font-size: clamp(1.05rem, 1.8vw, 1.28rem);
      line-height: 1.85;
      color: var(--muted);
      transition: color .45s ease;
    }

    .abstract p {
      margin: 0;
    }

    .abstract p + p {
      margin-top: 1.5rem;
    }

    .detail-meta {
      margin-top: 2.8rem;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1.8rem 2rem;
      max-width: 42rem;
    }

    .meta-block {
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .meta-label {
      margin: 0 0 0.8rem;
      font-size: 0.78rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .meta-value {
      margin: 0;
      color: var(--fg);
      line-height: 1.8;
      transition: color .45s ease;
    }

    .detail-gallery {
      position: relative;
      z-index: 2;
      margin-top: -100vh;
      padding: 100vh 0 5rem;
    }

    .gallery-list {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .gallery-item {
      width: 100%;
    }

    .gallery-transition-marker {
      width: 100%;
      height: 1px;
    }

    .gallery-transition-marker.chapter-break {
      height: 100vh;
    }

    .gallery-item.primary {
      width: 100vw;
      margin-left: calc(50% - 50vw);
      margin-right: calc(50% - 50vw);
    }

    .gallery-frame {
      position: relative;
      overflow: hidden;
      background: var(--panel);
      border-radius: 0;
      min-height: 72vh;
      display: grid;
      place-items: end start;
      isolation: isolate;
    }

    .gallery-item:not(.primary) .gallery-frame {
      width: min(1400px, calc(100vw - 4rem));
      aspect-ratio: 16 / 10;
      min-height: auto;
      margin: 0 auto;
      border-radius: 8px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.14);
    }

    .gallery-visual {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      transform: scale(1.01);
    }

    .gallery-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    .video-controls {
      position: absolute;
      left: 1.35rem;
      right: 1.35rem;
      bottom: 1.35rem;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 0.9rem;
      padding: 0.75rem 0.9rem;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.64);
      backdrop-filter: blur(12px);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .25s ease, transform .25s ease;
      pointer-events: none;
    }

    .gallery-frame:hover .video-controls,
    .gallery-frame:focus-within .video-controls {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .video-btn,
    .video-range {
      appearance: none;
      -webkit-appearance: none;
    }

    .video-btn {
      border: 0;
      background: rgba(255, 255, 255, 0.14);
      color: #fff;
      border-radius: 999px;
      padding: 0.45rem 0.8rem;
      font: 500 0.82rem/1 var(--font-body);
      cursor: pointer;
      transition: background .2s ease;
    }

    .video-btn:hover,
    .video-btn:focus-visible {
      background: rgba(255, 255, 255, 0.24);
      outline: none;
    }

    .video-range {
      height: 4px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.28);
      cursor: pointer;
    }

    .video-range.timeline {
      flex: 1;
      min-width: 6rem;
    }

    .video-range.volume {
      width: 6rem;
    }

    .video-range::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fff;
      border: 0;
    }

    .video-range::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fff;
      border: 0;
    }

    .video-range::-moz-range-track {
      height: 4px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.28);
    }

    .detail-footer-actions {
      position: fixed;
      left: 2rem;
      right: 2rem;
      bottom: 2rem;
      z-index: 30;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
    }

    .footer-action {
      pointer-events: auto;
      background: none;
      border: none;
      padding: 0;
      font: 400 11px/1 var(--font-body);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      transition: color .2s ease, transform .25s ease;
    }

    .footer-action:hover,
    .footer-action:focus-visible {
      color: var(--fg);
      transform: scale(1.14);
      outline: none;
    }

    #detailBackTop {
      opacity: 0;
      pointer-events: none;
      transform: translateY(6px) scale(1);
      transition: opacity .35s ease, transform .35s ease, color .2s;
    }

    #detailBackTop.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0) scale(1);
    }

    #detailBackTop.visible:hover,
    #detailBackTop.visible:focus-visible {
      transform: translateY(0) scale(1.14);
    }

    #nextProjectLink {
      font-size: 33px;
      line-height: 1;
      letter-spacing: 0.04em;
    }

    @media (max-width: 960px) {
      .detail-hero {
        grid-template-columns: 1fr;
        padding: 6rem 1.5rem 2rem;
      }

      .detail-copy {
        grid-column: 1;
        width: 100%;
      }

      .detail-copy-stack {
        grid-column: 1;
        width: 100%;
      }

      .detail-copy-stack .detail-copy {
        inset: 0;
      }

      .detail-copy-secondary {
        opacity: 0;
      }

      .detail-copy-secondary .abstract,
      .detail-copy-secondary .meta-value {
        color: var(--muted);
      }

      body.scrolled-copy .detail-copy,
      body.scrolled-copy .detail-copy .meta-value,
      body.scrolled-copy .detail-copy .abstract {
        color: inherit;
      }

      .detail-meta {
        grid-template-columns: 1fr;
      }

      .gallery-item.primary .gallery-frame {
        min-height: 52vh;
      }

      .detail-gallery {
        margin-top: -100vh;
        padding-top: 100vh;
      }

      .gallery-transition-marker.chapter-break {
        height: 60vh;
      }

      .gallery-item:not(.primary) .gallery-frame {
        width: min(100%, calc(100vw - 3rem));
      }

      .video-controls {
        left: 1rem;
        right: 1rem;
        bottom: 1rem;
        gap: 0.7rem;
        padding: 0.7rem 0.8rem;
      }

      .video-range.volume {
        width: 4.5rem;
      }

      .back-link {
        left: 1.5rem;
      }

      .detail-footer-actions {
        left: 1.5rem;
        right: 1.5rem;
        bottom: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <a class="back-link" id="backToWorkLink" href="./index.html#work">Back to work</a>

  <main class="detail-page">
    <section class="detail-hero">
      <div class="detail-copy-stack">
        <div class="detail-copy detail-copy-primary">
          <p class="eyebrow" id="detailEyebrow">Project detail</p>
          <h1 class="detail-title" id="detailTitle">Project</h1>
          <div class="abstract" id="detailAbstract"></div>

          <div class="detail-meta">
            <section class="meta-block">
              <p class="meta-label">Project Type</p>
              <p class="meta-value" id="detailServices"></p>
            </section>
            <section class="meta-block">
              <p class="meta-label">System Architecture</p>
              <p class="meta-value" id="detailSystemArchitecture"></p>
            </section>
            <section class="meta-block">
              <p class="meta-label">Credits</p>
              <p class="meta-value" id="detailCredits"></p>
            </section>
          </div>
        </div>

        <div class="detail-copy detail-copy-secondary" id="detailExhibitionCopy" hidden>
          <p class="eyebrow" id="detailExhibitionEyebrow">Exhibition</p>
          <h1 class="detail-title" id="detailExhibitionTitle">Exhibition</h1>
          <div class="abstract" id="detailExhibitionAbstract"></div>

          <div class="detail-meta">
            <section class="meta-block">
              <p class="meta-label">Credits</p>
              <p class="meta-value" id="detailExhibitionCredits"></p>
            </section>
          </div>
        </div>
      </div>
    </section>

    <section class="detail-gallery">
      <div class="gallery-list" id="galleryList"></div>
    </section>
  </main>

  <div class="detail-footer-actions">
    <button class="footer-action" id="detailBackTop" type="button">Nowhere to go but up ↑↑</button>
    <a class="footer-action" id="nextProjectLink" href="./index.html#work">Next project</a>
  </div>

        title: "ELEN",
        eyebrow: "Speculative identity system",
        abstract: `<p>ELEN is a speculative photographic instrument that treats wireless data as contemporary haunting.</p><p>If spirit photography once revealed traces of presence without bodies, today’s ghosts are bodies without presence: residual selves continuously leaking into Wi-Fi, Bluetooth, and machine-to-machine signals. The device captures personal network activity and translates it into spectral forms layered onto a real photograph of the site. These apparitions are not illustrations but condensations of signal, duration, and repetition, where glitches and density become ectoplasm. From fragments of personal metadata that fall from us constantly, gathered silently and without spectacle, the machine conjures figures that hover between dehumanized infrastructure and intimate trace. A ritual apparatus and surveillance oracle, it reframes behavioral data as a new species of shadow creature.</p>`,
        services: ["#SpeculativeDesign", "#InteractionDesign", "#ProductDesign"],
        systemArchitecture: ["#RaspberryPi", "#Kismet", "#PhysicalComputing", "#WifiSignal", "#RealTimeVisualization"],
        credits: ["Jérémy Martin", "Nicholas Vos"],
        exhibition: {
          eyebrow: "Exhibition",
          title: "ELEN Exhibition",
          abstract: `<p>ELEN was presented as an immersive installation that extended the device into space. Displayed on a custom rotating platform, the object was accompanied by its packaging and brochure, forming a cohesive product narrative. A large-scale projection translated live wireless signals from the exhibition environment into evolving entities, allowing visitors to see their own presence emerge in real time. The setup transformed the space into a responsive field, where the invisible activity of the audience became part of the work itself.</p>`,
          credits: ["SACEBA - Morbio Inferiore", "Leonardo Angelucci"]
        },
        theme: {
          bg: "#161217",
          fg: "#F0EAF5",
          muted: "rgba(240,234,245,0.72)",
          soft: "rgba(240,234,245,0.34)",
          border: "rgba(240,234,245,0.12)",
          panel: "rgba(255,255,255,0.06)"
        },
        images: [
          { label: "Front", bg: 'center / cover no-repeat url("assets/projects/elen/jpeg/elen-front.jpg")' },
          { label: "Detail", bg: 'center / cover no-repeat url("assets/projects/elen/jpeg/elen-detail.jpg")' },
          { label: "Box", bg: 'center / cover no-repeat url("assets/projects/elen/jpeg/elen-box.jpg")' },
          { label: "View", bg: 'center / cover no-repeat url("assets/projects/elen/jpeg/elen-view.jpg")' },
          { label: "Interaction 1", bg: 'center / cover no-repeat url("assets/projects/elen/jpeg/elen-interaction1.jpg")' },
          { label: "Interaction 2", bg: 'center / cover no-repeat url("assets/projects/elen/jpeg/elen-interaction2.jpg")' },
          { label: "Interaction 3", bg: 'center / cover no-repeat url("assets/projects/elen/jpeg/elen-interaction3.jpg")' },
          { label: "ELEN video", type: "video", src: "assets/projects/elen/video/ELEN_HR_video.mp4" },
          { type: "section-break", key: "exhibition" },
          { label: "Exhibition 1", bg: 'center / cover no-repeat url("assets/projects/elen/jpeg/elen-expo1.jpg")' },
          { label: "Exhibition 2", bg: 'center / cover no-repeat url("assets/projects/elen/jpeg/elen-expo2.jpg")' },
          { label: "Exhibition 3", bg: 'center / cover no-repeat url("assets/projects/elen/jpeg/elen-expo3.jpg")' },
          { label: "Exhibition 4", bg: 'center / cover no-repeat url("assets/projects/elen/jpeg/elen-expo4.jpg")' },
          { label: "Exhibition 5", bg: 'center / cover no-repeat url("assets/projects/elen/jpeg/elen-expo5.jpg")' }
        ]
      },
      "lynx-2-0": {
        title: "Lynx 2.0",
        eyebrow: "Browser-based interactive game",
        abstract: `<p>The Lynx Game 2.0 is a browser-based interactive matching game that expands a previous prototype through the integration of external web APIs. Players must identify a specific cat image within a timed grid while managing score and lives. The game dynamically fetches cat images and facts from online APIs, incorporates audiovisual feedback, and features a responsive interface with a simple navigation system. The project explores real-time data usage, user interaction design, and multimedia integration in a playful and replayable web experience.</p>`,
        services: ["#Coding", "#Game", "#UI"],
        systemArchitecture: ["#HTML", "#CSS", "#JS", "#API"],
        credits: [],
        theme: {
          bg: "#F7F2DA",
          fg: "#1F1A0B",
          muted: "rgba(31,26,11,0.68)",
          soft: "rgba(31,26,11,0.34)",
          border: "rgba(31,26,11,0.12)",
          panel: "rgba(255,255,255,0.44)"
        },
        images: [
          { label: "PC interaction", bg: 'center / cover no-repeat url("assets/projects/lynx 2.0/jpeg/pc interaction_HR.png")' },
          { label: "PC studio mockup", bg: 'center / cover no-repeat url("assets/projects/lynx 2.0/jpeg/pc studio_mockup_HR.png")' },
          { label: "PC studio desk", bg: 'center / cover no-repeat url("assets/projects/lynx 2.0/jpeg/pc_studio desk_HR.png")' },
          { label: "Phone mockup", bg: 'center / cover no-repeat url("assets/projects/lynx 2.0/jpeg/phone_triplemockup_HR.png")' },
          { label: "Tablet desk", bg: 'center / cover no-repeat url("assets/projects/lynx 2.0/jpeg/tablet_scene desk_HR.png")' },
          { label: "Demo", type: "video", src: "assets/projects/lynx 2.0/video/LYNX2.0_demo_LR.mov" }
        ]
      },
      "adaptune": {
        title: "Adaptune",
        eyebrow: "Adaptive music companion",
        abstract: `<p>Adaptune is a compact, portable music companion that turns everyday contexts into an adaptive soundtrack. Built as a rapid workshop proof-of-concept, the device leverages a smartphone embedded inside a small enclosure: the front-facing camera observes the user's activity, while audio is delivered through the phone's speaker.</p><p>Instead of presenting a conventional interface, the phone's display is mostly concealed and only shows two expressive eyes that reflect the detected context and the current musical mood. The system estimates high-level states such as focused work versus short breaks and other contexts like gym activity by extracting on-device cues from the camera stream and mapping them to a small set of interpretable "mood" variables. These variables drive an adaptive music engine based on AI-generated tracks: distinct songs are generated for different moods and contexts, and Adaptune transitions between them using smooth crossfades triggered on musically meaningful boundaries.</p><p>In practice, this approach proved more effective than stem-based vertical mixing for conveying emotion, since each track can be composed and produced with a clear affective intent while the crossfade preserves continuity and avoids abrupt changes.</p>`,
        services: ["#Prototyping", "#MachineLearning", "#InteractionDesign", "#ConceptualDesign"],
        systemArchitecture: ["#TensorFlowJS", "#OpenAI", "#FaceAPI", "#WebRTC", "#ComputerVision"],
        credits: ["Nicholas Vos", "Dajana Seefluth"],
        theme: {
          bg: "#F8EEF0",
          fg: "#231416",
          muted: "rgba(35,20,22,0.68)",
          soft: "rgba(35,20,22,0.34)",
          border: "rgba(35,20,22,0.12)",
          panel: "rgba(255,255,255,0.48)"
        },
        images: [
          { label: "View 1", bg: 'center / cover no-repeat url("assets/projects/adaptune/jpeg/adaptune-1.jpg")' },
          { label: "View 2", bg: 'center / cover no-repeat url("assets/projects/adaptune/jpeg/adaptune-2.jpg")' },
          { label: "View 3", bg: 'center / cover no-repeat url("assets/projects/adaptune/jpeg/adaptune-3.jpg")' },
          { label: "View 4", bg: 'center / cover no-repeat url("assets/projects/adaptune/jpeg/adaptune-4.jpg")' },
          { label: "View 5", bg: 'center / cover no-repeat url("assets/projects/adaptune/jpeg/adaptune-5.jpg")' }
        ]
      }
    };

    const params = new URLSearchParams(window.location.search);
    const slug = params.get("project") || "rememberita";
    const project = PROJECTS[slug] || PROJECTS["rememberita"];
    const PROJECT_ORDER = [
      "rememberita",
      "meeting-pond",
      "elen",
      "rememberita-device",
      "adaptune",
      "financial-planning-hub",
      "lynx-2-0"
    ];
    const currentIndex = PROJECT_ORDER.indexOf(slug);
    const nextSlug = PROJECT_ORDER[(currentIndex + 1 + PROJECT_ORDER.length) % PROJECT_ORDER.length];

    const hexToRgb = hex => {
      const clean = hex.replace("#", "");
      const value = clean.length === 3
        ? clean.split("").map(ch => ch + ch).join("")
        : clean;
      return [
        parseInt(value.slice(0, 2), 16),
        parseInt(value.slice(2, 4), 16),
        parseInt(value.slice(4, 6), 16)
      ];
    };

    const [fgR, fgG, fgB] = hexToRgb(project.theme.fg);
    const fgIsDark = (fgR * 0.2126 + fgG * 0.7152 + fgB * 0.0722) < 180;
    const neutralMuted = fgIsDark ? "rgba(24,24,15,0.72)" : "rgba(255,255,255,0.82)";
    const neutralSoft = fgIsDark ? "rgba(24,24,15,0.38)" : "rgba(255,255,255,0.42)";

    document.documentElement.style.setProperty("--bg", project.theme.bg);
    document.documentElement.style.setProperty("--fg", project.theme.fg);
    document.documentElement.style.setProperty("--muted", neutralMuted);
    document.documentElement.style.setProperty("--soft-muted", neutralSoft);
    document.documentElement.style.setProperty("--border", project.theme.border);
    document.documentElement.style.setProperty("--panel", project.theme.panel);

    document.body.style.background = `
      radial-gradient(circle at top left, rgba(255, 107, 157, 0.12), transparent 28%),
      radial-gradient(circle at 80% 15%, rgba(78, 191, 237, 0.14), transparent 24%),
      ${project.theme.bg}
    `;

    document.getElementById("detailEyebrow").textContent = project.eyebrow;
    document.getElementById("detailTitle").textContent = project.title;
    document.getElementById("detailAbstract").innerHTML = project.abstract;
    document.getElementById("detailServices").textContent = project.services.join(" ");
    document.getElementById("detailSystemArchitecture").textContent = (project.systemArchitecture || []).join(" ");
    document.getElementById("detailCredits").textContent = project.credits.join(", ");
    const exhibitionCopy = document.getElementById("detailExhibitionCopy");
    if (project.exhibition) {
      exhibitionCopy.hidden = false;
      document.getElementById("detailExhibitionEyebrow").textContent = project.exhibition.eyebrow || "Exhibition";
      document.getElementById("detailExhibitionTitle").textContent = project.exhibition.title || "Exhibition";
      document.getElementById("detailExhibitionAbstract").innerHTML = project.exhibition.abstract || "";
      document.getElementById("detailExhibitionCredits").textContent = (project.exhibition.credits || []).join(", ");
    } else {
      exhibitionCopy.hidden = true;
    }
    const backToWorkLink = document.getElementById("backToWorkLink");
    backToWorkLink.href = `./index.html?project=${encodeURIComponent(slug)}#${encodeURIComponent(slug)}`;
    backToWorkLink.addEventListener("click", () => {
      sessionStorage.setItem("skipIntroOnce", "1");
    });
    const nextProjectLink = document.getElementById("nextProjectLink");
    nextProjectLink.href = `./project-detail.html?project=${encodeURIComponent(nextSlug)}`;
    const backTopButton = document.getElementById("detailBackTop");
    const toggleBackTop = () => {
      const nearBottom =
        window.scrollY + window.innerHeight >= document.documentElement.scrollHeight - 300;
      backTopButton.classList.toggle("visible", nearBottom);
    };
    backTopButton.addEventListener("click", () => {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
    toggleBackTop();
    window.addEventListener("scroll", toggleBackTop, { passive: true });
    document.title = `${project.title} — Project Detail`;

    const gallery = document.getElementById("galleryList");
    let exhibitionMarker = null;
    let exhibitionFirstItem = null;
    let afterExhibitionBreak = false;
    project.images.forEach((image, index) => {
      if (image.type === "section-break") {
        const marker = document.createElement("div");
        marker.className = "gallery-transition-marker chapter-break";
        marker.dataset.key = image.key || "";
        gallery.appendChild(marker);
        if (image.key === "exhibition") {
          exhibitionMarker = marker;
          afterExhibitionBreak = true;
        }
        return;
      }

      const item = document.createElement("article");
      item.className = `gallery-item${index === 0 ? " primary" : ""}`;

      if (afterExhibitionBreak && !exhibitionFirstItem) {
        exhibitionFirstItem = item;
      }

      const frame = document.createElement("div");
      frame.className = "gallery-frame";

      let visual;
      if (image.type === "video") {
        visual = document.createElement("video");
        visual.className = "gallery-video";
        visual.src = image.src;
        visual.autoplay = true;
        visual.muted = true;
        visual.loop = true;
        visual.playsInline = true;
      } else {
        visual = document.createElement("div");
        visual.className = "gallery-visual";
        visual.style.background = image.bg;
      }

      if (image.type === "video") {
        const controls = document.createElement("div");
        controls.className = "video-controls";

        const playButton = document.createElement("button");
        playButton.className = "video-btn";
        playButton.type = "button";
        playButton.textContent = "Pause";

        const timeline = document.createElement("input");
        timeline.className = "video-range timeline";
        timeline.type = "range";
        timeline.min = "0";
        timeline.max = "100";
        timeline.step = "0.1";
        timeline.value = "0";

        const volume = document.createElement("input");
        volume.className = "video-range volume";
        volume.type = "range";
        volume.min = "0";
        volume.max = "1";
        volume.step = "0.01";
        volume.value = "0";

        const syncTimeline = () => {
          if (!visual.duration) return;
          timeline.value = (visual.currentTime / visual.duration) * 100;
        };

        const syncPlayState = () => {
          playButton.textContent = visual.paused ? "Play" : "Pause";
        };

        playButton.addEventListener("click", () => {
          if (visual.paused) {
            visual.play();
          } else {
            visual.pause();
          }
        });

        timeline.addEventListener("input", () => {
          if (!visual.duration) return;
          visual.currentTime = (Number(timeline.value) / 100) * visual.duration;
        });

        volume.addEventListener("input", () => {
          visual.muted = false;
          visual.volume = Number(volume.value);
        });

        visual.addEventListener("timeupdate", syncTimeline);
        visual.addEventListener("play", syncPlayState);
        visual.addEventListener("pause", syncPlayState);
        visual.addEventListener("loadedmetadata", syncTimeline);

        controls.appendChild(playButton);
        controls.appendChild(timeline);
        controls.appendChild(volume);
        frame.appendChild(controls);
      }

      frame.appendChild(visual);
      item.appendChild(frame);
      gallery.appendChild(item);
    });

    const handleScroll = () => {
      const firstImage = gallery.querySelector(".gallery-item.primary");
      if (!firstImage || window.innerWidth <= 960) {
        document.body.classList.remove("scrolled-copy");
        document.body.classList.remove("exhibition-copy-active");
        document.body.classList.remove("exhibition-copy-dimmed");
        return;
      }

      const rect = firstImage.getBoundingClientRect();
      const imageMidpoint = rect.top + (rect.height / 2);
      const viewportMidpoint = window.innerHeight / 2;

      document.body.classList.toggle("scrolled-copy", imageMidpoint <= viewportMidpoint);

      if (project.exhibition && exhibitionMarker) {
        const markerRect = exhibitionMarker.getBoundingClientRect();
        const exhibitionActive = markerRect.top <= viewportMidpoint;
        document.body.classList.toggle("exhibition-copy-active", exhibitionActive);

        if (exhibitionActive && exhibitionFirstItem) {
          const exhibitionFirstRect = exhibitionFirstItem.getBoundingClientRect();
          document.body.classList.toggle("exhibition-copy-dimmed", exhibitionFirstRect.top <= viewportMidpoint);
        } else {
          document.body.classList.remove("exhibition-copy-dimmed");
        }
      } else {
        document.body.classList.remove("exhibition-copy-active");
        document.body.classList.remove("exhibition-copy-dimmed");
      }
    };

    handleScroll();
    window.addEventListener("scroll", handleScroll, { passive: true });
    window.addEventListener("resize", handleScroll);
  </script>
</body>
</html>
